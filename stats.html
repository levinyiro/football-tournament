                            } else if (scoreB > scoreA) {
                                playerStats[playerBName].wins++;
                                playerStats[playerAName].losses++;
                            } else {
                                playerStats[playerAName].draws++;
                                playerStats[playerBName].draws++;
                            }
                        }
                    }
                });
            });

            tournaments.push(tournamentInfo);
        });

        // Convert tournaments set to array for display
        Object.keys(playerStats).forEach(name => {
            playerStats[name].tournaments = Array.from(playerStats[name].tournaments);
        });

        // Sort players by wins
        const sortedPlayers = Object.entries(playerStats)
            .sort((a, b) => b[1].wins - a[1].wins);

        // Render statistics
        const container = document.getElementById('statsContainer');

        // Top stats cards
        const topStats = document.createElement('div');
        topStats.className = 'top-section';
        topStats.innerHTML = '<h2 class="section-title">Csúcsteljesítmények</h2>';

        const topPlayers = document.createElement('div');
        topPlayers.className = 'top-players';

        const topCard1 = document.createElement('div');
        topCard1.className = 'top-card';
        const topWinner = sortedPlayers[0];
        topCard1.innerHTML = `
            <div class="medal">🥇</div>
            <div class="top-card-title">Legtöbb győzelem</div>
            <div class="top-card-value">${topWinner[0]}</div>
            <div class="top-card-detail">${topWinner[1].wins} győzelem ${topWinner[1].matches} mérkőzésből</div>
        `;

        const topCard2 = document.createElement('div');
        topCard2.className = 'top-card';
        const topScorer = sortedPlayers.reduce((max, player) =>
            player[1].goalsFor > max[1].goalsFor ? player : max
        );
        topCard2.innerHTML = `
            <div class="medal">⚽</div>
            <div class="top-card-title">Legtöbb gól</div>
            <div class="top-card-value">${topScorer[0]}</div>
            <div class="top-card-detail">${topScorer[1].goalsFor} gól az összes mérkőzésben</div>
        `;

        const topCard3 = document.createElement('div');
        topCard3.className = 'top-card';
        const topWinRate = sortedPlayers.filter(p => p[1].matches >= 3).reduce((max, player) => {
            const winRate = (player[1].wins / player[1].matches) * 100;
            const maxWinRate = (max[1].wins / max[1].matches) * 100;
            return winRate > maxWinRate ? player : max;
        });
        const topWinRatePercent = ((topWinRate[1].wins / topWinRate[1].matches) * 100).toFixed(1);
        topCard3.innerHTML = `
            <div class="medal">📊</div>
            <div class="top-card-title">Legjobb győzelmi arány (min. 3 mérkőzés)</div>
            <div class="top-card-value">${topWinRate[0]}</div>
            <div class="top-card-detail">${topWinRatePercent}% (${topWinRate[1].wins}/${topWinRate[1].matches})</div>
        `;

        topPlayers.appendChild(topCard1);
        topPlayers.appendChild(topCard2);
        topPlayers.appendChild(topCard3);
        topStats.appendChild(topPlayers);
        container.appendChild(topStats);

        // Overall stats cards
        const statsRow = document.createElement('div');
        statsRow.className = 'stats-grid';

        const totalMatches = sortedPlayers.reduce((sum, p) => sum + p[1].matches, 0) / 2;
        const totalGoals = sortedPlayers.reduce((sum, p) => sum + p[1].goalsFor, 0) / 2;
        const avgGoalsPerMatch = (totalGoals / totalMatches).toFixed(2);

        const card1 = document.createElement('div');
        card1.className = 'stat-card';
        card1.innerHTML = `
            <div class="stat-title">Összes mérkőzés</div>
            <div class="stat-value">${Math.round(totalMatches)}</div>
            <div class="stat-subtitle">Játszott mérkőzések a tornákon</div>
        `;

        const card2 = document.createElement('div');
        card2.className = 'stat-card';
        card2.innerHTML = `
            <div class="stat-title">Összes gól</div>
            <div class="stat-value">${Math.round(totalGoals)}</div>
            <div class="stat-subtitle">Gólok az összes mérkőzésben</div>
        `;

        const card3 = document.createElement('div');
        card3.className = 'stat-card';
        card3.innerHTML = `
            <div class="stat-title">Átlagos gólok/mérkőzés</div>
            <div class="stat-value">${avgGoalsPerMatch}</div>
            <div class="stat-subtitle">Mérkőzésenként lőtt gólok</div>
        `;

        const card4 = document.createElement('div');
        card4.className = 'stat-card';
        card4.innerHTML = `
            <div class="stat-title">Aktív játékosok</div>
            <div class="stat-value">${sortedPlayers.length}</div>
            <div class="stat-subtitle">Részt vett a tornákon</div>
        `;

        statsRow.appendChild(card1);
        statsRow.appendChild(card2);
        statsRow.appendChild(card3);
        statsRow.appendChild(card4);
        container.appendChild(statsRow);

        // Player statistics table
        const playersSection = document.createElement('div');
        playersSection.className = 'players-section';
        playersSection.innerHTML = '<h2 class="section-title">Játékos Statisztikák</h2>';

        const headerRow = document.createElement('div');
        headerRow.className = 'header-row';
        headerRow.innerHTML = `
            <div class="header-cell">Játékos</div>
            <div class="header-cell">Mérkőzés</div>
            <div class="header-cell">Győzelem</div>
            <div class="header-cell">Vereség</div>
            <div class="header-cell">Döntetlenszázalék</div>
            <div class="header-cell">Gólkülönbség</div>
            <div class="header-cell">Tornák</div>
            <div class="header-cell">Átlag gól</div>
        `;
        playersSection.appendChild(headerRow);

        sortedPlayers.forEach(([name, stats]) => {
            const winRate = ((stats.wins / stats.matches) * 100).toFixed(1);
            const goalDiff = stats.goalsFor - stats.goalsAgainst;
            const avgGoal = (stats.goalsFor / stats.matches).toFixed(1);

            const playerRow = document.createElement('div');
            playerRow.className = 'player-row';
            playerRow.innerHTML = `
                <div class="player-name">${name}</div>
                <div class="stat-cell">${stats.matches}</div>
                <div class="stat-cell wins">${stats.wins}</div>
                <div class="stat-cell losses">${stats.losses}</div>
                <div class="stat-cell winrate">${winRate}%</div>
                <div class="stat-cell">${goalDiff > 0 ? '+' : ''}${goalDiff}</div>
                <div class="stat-cell">${stats.tournaments.length}</div>
                <div class="stat-cell">${avgGoal}</div>
            `;
            playersSection.appendChild(playerRow);
        });

        container.appendChild(playersSection);
    </script>
</body>
</html>
